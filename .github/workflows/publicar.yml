name: UNVINITO Noticias Diarias

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install groq feedparser tweepy requests

      - name: Publicar noticias
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python scripts/publicar.py

     - name: Guardar noticias en GitHub
        run: |
          git config user.name "UNVINITO Bot"
          git config user.email "bot@unvinitowine.com"
          git add docs/data/ || true
          git diff --staged --quiet || git commit -m "Noticias $(date +%Y-%m-%d)"
          git push || true
