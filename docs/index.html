<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍷 UNVINITO Noticias</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Georgia, serif; 
            background: #1a0a00; 
            color: #f5e6d3; 
            min-height: 100vh;
        }
        header {
            background: #6b1a1a;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #c0392b;
        }
        header h1 { font-size: 2em; color: #f5e6d3; }
        header p { color: #d4a574; margin-top: 8px; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .noticia {
            background: #2d1200;
            border: 1px solid #6b1a1a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #c0392b;
        }
        .noticia h2 { color: #d4a574; font-size: 1.1em; margin-bottom: 10px; }
        .noticia p { color: #f5e6d3; line-height: 1.6; }
        .noticia .meta { 
            color: #8b6914; 
            font-size: 0.85em; 
            margin-top: 10px; 
        }
        .noticia a { color: #c0392b; }
        footer {
            text-align: center;
            padding: 20px;
            color: #8b6914;
            font-size: 0.85em;
            border-top: 1px solid #6b1a1a;
            margin-top: 40px;
        }
        #fecha { color: #d4a574; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>🍷 UNVINITO Noticias</h1>
        <p>Noticias de vinos de Chile y el mundo · Valle de Colchagua</p>
        <p id="fecha"></p>
    </header>
    
    <div class="container" id="contenido">
        <p style="text-align:center; color:#d4a574; padding:40px">
            Cargando noticias... 🍷
        </p>
    </div>

    <footer>
        Generado automáticamente · UNVINITO · Valle de Colchagua, Chile<br>
        Síguenos en 
        <a href="https://twitter.com/unvinitowine" style="color:#c0392b">@unvinitowine</a> · 
        <a href="https://t.me/unvinito_noticias" style="color:#c0392b">Telegram</a>
    </footer>

    <script>
        document.getElementById('fecha').textContent = 
            new Date().toLocaleDateString('es-CL', {
                weekday: 'long', year: 'numeric', 
                month: 'long', day: 'numeric'
            });
    </script>
</body>
</html>
