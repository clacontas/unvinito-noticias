<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍷 UNVINITO Noticias</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Georgia, serif; 
            background: #1a0a00; 
            color: #f5e6d3; 
            min-height: 100vh;
        }
        header {
            background: #6b1a1a;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #c0392b;
        }
        header h1 { font-size: 2em; color: #f5e6d3; }
        header p { color: #d4a574; margin-top: 8px; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .noticia {
            background: #2d1200;
            border: 1px solid #6b1a1a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #c0392b;
        }
        .noticia.destacada {
            border-left: 4px solid #d4a574;
            background: #3d1a00;
        }
        .badge {
            background: #d4a574;
            color: #1a0a00;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .noticia h2 { color: #d4a574; font-size: 1.1em; margin-bottom: 10px; }
        .noticia p { color: #f5e6d3; line-height: 1.6; }
        .noticia .meta { 
            color: #8b6914; 
            font-size: 0.85em; 
            margin-top: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .noticia a { 
            color: #c0392b; 
            text-decoration: none;
        }
        .noticia a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            padding: 20px;
            color: #8b6914;
            font-size: 0.85em;
            border-top: 1px solid #6b1a1a;
            margin-top: 40px;
        }
        footer a { color: #c0392b; }
        #fecha { color: #d4a574; font-weight: bold; }
        .cargando { text-align:center; color:#d4a574; padding:40px; }
    </style>
</head>
<body>
    <header>
        <h1>🍷 UNVINITO Noticias</h1>
        <p>Noticias de vinos de Chile y el mundo · Valle de Colchagua</p>
        <p id="fecha"></p>
    </header>
    
    <div class="container" id="contenido">
        <p class="cargando">Cargando noticias... 🍷</p>
    </div>

    <footer>
        Generado automáticamente · UNVINITO · Valle de Colchagua, Chile<br>
        Síguenos en 
        <a href="https://twitter.com/unvinitowine">@unvinitowine</a> · 
        <a href="https://t.me/unvinito_noticias">Telegram</a>
    </footer>

    <script>
        document.getElementById('fecha').textContent = 
            new Date().toLocaleDateString('es-CL', {
                weekday: 'long', year: 'numeric', 
                month: 'long', day: 'numeric'
            });

        fetch('data/noticias.json')
            .then(r => r.json())
            .then(data => {
                const contenido = document.getElementById('contenido');
                contenido.innerHTML = '';
                
                data.noticias.forEach(n => {
                    const div = document.createElement('div');
                    div.className = 'noticia' + (n.destacada ? ' destacada' : '');
                    div.innerHTML = `
                        ${n.destacada ? '<span class="badge">⭐ Destacada</span>' : ''}
                        <h2>${n.titulo}</h2>
                        <p>${n.descripcion}</p>
                        <div class="meta">
                            📰 ${n.fuente}
                            <a href="${n.url}" target="_blank">Leer más →</a>
                        </div>
                    `;
                    contenido.appendChild(div);
                });
            })
            .catch(() => {
                document.getElementById('contenido').innerHTML = 
                    '<p class="cargando">Las noticias se actualizan cada mañana a las 8 AM 🍷</p>';
            });
    </script>
</body>
</html>
