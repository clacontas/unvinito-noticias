<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNVINITO Noticias</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --negro: #0C0C0C;
            --superficie: #141414;
            --superficie2: #1C1C1C;
            --texto: #E8E0D5;
            --texto-suave: #9A9087;
            --borgona: #9B2335;
            --dorado: #B8965A;
            --separador: #2A2A2A;
        }

        body {
            background: var(--negro);
            color: var(--texto);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            padding: 48px 24px 32px;
            border-bottom: 1px solid var(--separador);
            position: relative;
        }

        .header-linea-dorada {
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dorado), transparent);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .header-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dorado);
        }

        .header-fecha {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--texto-suave);
            text-align: right;
        }

        .header-titulo {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 200;
            line-height: 1;
            letter-spacing: 0.25em;
            color: var(--texto);
            text-transform: uppercase;
        }

        .header-titulo-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: 300;
            font-style: italic;
            color: var(--dorado);
            letter-spacing: 0.05em;
            margin-top: 8px;
            display: block;
        }

        .header-identidad {
            margin-top: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--texto-suave);
            font-style: italic;
        }

        /* CONTENIDO */
        main {
            padding: 0 24px;
            max-width: 680px;
            margin: 0 auto;
        }

        /* SECCIÓN */
        .seccion {
            padding: 36px 0;
            border-bottom: 1px solid var(--separador);
        }

        .seccion:last-child { border-bottom: none; }

        .seccion-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .seccion-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dorado);
        }

        .seccion-linea {
            flex: 1;
            height: 1px;
            background: var(--separador);
        }

        /* TARJETA NOTICIA */
        .noticia {
            padding: 24px;
            background: var(--superficie);
            border-radius: 2px;
            border-left: 2px solid var(--borgona);
        }

        .noticia-titulo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            line-height: 1.3;
            color: var(--texto);
            margin-bottom: 12px;
        }

        .noticia-opinion {
            font-size: 14px;
            font-weight: 300;
            color: var(--texto-suave);
            line-height: 1.7;
            margin-bottom: 16px;
            font-style: italic;
        }

        .noticia-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .noticia-fuente {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--texto-suave);
        }

        .noticia-link {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dorado);
            text-decoration: none;
        }

        /* ¿LO SABÍAS? */
        .lo-sabias-card {
            padding: 28px;
            background: var(--superficie);
            border-radius: 2px;
            border-top: 2px solid var(--dorado);
        }

        .lo-sabias-texto {
            font-size: 15px;
            font-weight: 300;
            color: var(--texto);
            line-height: 1.8;
        }

        /* EL MOMENTO */
        .momento-card {
            padding: 28px;
            background: var(--superficie);
            border-radius: 2px;
            border-left: 2px solid var(--borgona);
        }

        .momento-texto {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--texto);
            line-height: 1.7;
            font-style: italic;
        }

        /* CIERRE */
        .cierre {
            padding: 32px 0;
            text-align: center;
        }

        .cierre-texto {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            font-style: italic;
            color: var(--dorado);
        }

        /* FOOTER */
        footer {
            padding: 40px 24px;
            border-top: 1px solid var(--separador);
            text-align: center;
        }

        .footer-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--texto-suave);
            margin-bottom: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--texto-suave);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover { color: var(--dorado); }

        .footer-link-comprar {
            color: var(--dorado);
            border: 1px solid var(--dorado);
            padding: 6px 14px;
            border-radius: 1px;
        }

        .footer-link-comprar:hover {
            background: var(--dorado);
            color: var(--negro);
        }

        .footer-copy {
            font-size: 10px;
            color: var(--separador);
            letter-spacing: 1px;
        }

        /* CARGANDO */
        .cargando {
            text-align: center;
            color: var(--texto-suave);
            padding: 60px 0;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <span class="header-label">Valle de Colchagua · Chile</span>
            <span class="header-fecha" id="header-fecha"></span>
        </div>
        <h1 class="header-titulo">UNVINITO<span class="header-titulo-sub">Noticias</span></h1>
        <p class="header-identidad" id="header-identidad"></p>
        <div class="header-linea-dorada"></div>
    </header>

    <main id="contenido">
        <div class="cargando">Cargando... 🍷</div>
    </main>

    <footer>
        <div class="footer-logo">Unvinito</div>
        <div class="footer-links">
            <a href="https://twitter.com/unvinitowine" class="footer-link" target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                @unvinitowine
            </a>
            <a href="https://t.me/unvinito_noticias" class="footer-link" target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                Telegram
            </a>
            <a href="https://instagram.com/unvinitowine" class="footer-link" target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                Instagram
            </a>
            <a href="https://unvinito.cl" class="footer-link footer-link-comprar" target="_blank">
                🍷 Comprar
            </a>
        </div>
        <p class="footer-copy">Valle de Colchagua · Chile · Generado cada mañana</p>
        <p class="footer-copy" style="margin-top:8px">Este sitio no recolecta datos personales de sus visitantes.</p>
    </footer>

    <script>
        // Fecha en header
        const ahora = new Date();
        const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        const fechaStr = ahora.toLocaleDateString('es-CL', opciones);
        const partes = fechaStr.split(' ');
        document.getElementById('header-fecha').innerHTML = 
            `${partes[0]}<br>${partes.slice(1).join(' ')}`;

        // Cargar noticias del JSON
        fetch('data/noticias.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                const main = document.getElementById('contenido');
                main.innerHTML = '';

                // Identidad del día
                if (data.identidad) {
                    document.getElementById('header-identidad').textContent = data.identidad;
                }

                // SECCIÓN VINO
                const noticia = data.noticias[0];
                const seccionVino = document.createElement('section');
                seccionVino.className = 'seccion';
                seccionVino.innerHTML = `
                    <div class="seccion-header">
                        <span class="seccion-label">🍷 Vino</span>
                        <div class="seccion-linea"></div>
                    </div>
                    <div class="noticia">
                        <h2 class="noticia-titulo">${noticia.titulo}</h2>
                        <p class="noticia-opinion">${noticia.descripcion}</p>
                        <div class="noticia-meta">
                            <span class="noticia-fuente">📰 ${noticia.fuente}</span>
                            <a href="${noticia.url}" class="noticia-link" target="_blank">Leer más →</a>
                        </div>
                    </div>
                `;
                main.appendChild(seccionVino);

                // SECCIÓN ¿LO SABÍAS?
                if (data.lo_sabias) {
                    const seccionSabias = document.createElement('section');
                    seccionSabias.className = 'seccion';
                    seccionSabias.innerHTML = `
                        <div class="seccion-header">
                            <span class="seccion-label">¿Lo sabías?</span>
                            <div class="seccion-linea"></div>
                        </div>
                        <div class="lo-sabias-card">
                            <p class="lo-sabias-texto">${data.lo_sabias}</p>
                        </div>
                    `;
                    main.appendChild(seccionSabias);
                }

                // SECCIÓN EL MOMENTO (viernes y domingo)
                if (data.momento) {
                    const seccionMomento = document.createElement('section');
                    seccionMomento.className = 'seccion';
                    seccionMomento.innerHTML = `
                        <div class="seccion-header">
                            <span class="seccion-label">El Momento</span>
                            <div class="seccion-linea"></div>
                        </div>
                        <div class="momento-card">
                            <p class="momento-texto">${data.momento}</p>
                        </div>
                    `;
                    main.appendChild(seccionMomento);
                }

                // CIERRE
                if (data.cierre) {
                    const cierre = document.createElement('div');
                    cierre.className = 'cierre';
                    cierre.innerHTML = `<p class="cierre-texto">${data.cierre}</p>`;
                    main.appendChild(cierre);
                }
            })
            .catch(() => {
                document.getElementById('contenido').innerHTML = 
                    '<div class="cargando">Las noticias llegan cada mañana a las 8 AM 🍷</div>';
            });
    </script>

</body>
</html>
